name: Publish

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      npm_tag:
        description: npm dist-tag
        required: true
        default: latest
        type: choice
        options:
          - latest
          - next
      dry_run:
        description: Validate without publishing
        required: true
        default: false
        type: boolean

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-publish
  cancel-in-progress: false

jobs:
  publish:
    name: Publish pokayoke to npm
    runs-on: ubuntu-latest
    environment: npm
    if: github.repository == 'rorz/pokayoke' && (github.event_name == 'release' || github.ref == 'refs/heads/main')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Setup npm
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Upgrade npm
        run: npm install --global npm@latest && npm --version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check
        run: bun run check

      - name: Inspect package
        run: NPM_CONFIG_CACHE=/tmp/pokayoke-npm-cache npm pack --dry-run --workspace pokayoke

      - name: Resolve npm tag
        id: npm-tag
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "release" && "${{ github.event.release.prerelease }}" == "true" ]]; then
            echo "tag=next" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "tag=${{ inputs.npm_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish dry run
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run
        run: npm publish --dry-run --workspace pokayoke --tag "${{ steps.npm-tag.outputs.tag }}"

      - name: Publish
        if: github.event_name != 'workflow_dispatch' || !inputs.dry_run
        run: npm publish --workspace pokayoke --tag "${{ steps.npm-tag.outputs.tag }}"
